# Tiny Tapeout Project Information
project:
  title: "Tunable Ring Oscillator TRNG (Sky130)"
  description: "A tunable Ring Oscillator based TRNG using Sky130 standard cells."
  author: "Josh (Gemini CLI)"
  language: "Verilog"
  clock_hz: 10000000

# Specify the depth and width of your design.
# A single tile is 1x1.
# 1x1 tile is 160um x 225um.
tiles: "2x1"

# Pins assignments
# ui_in[7:0] : Dedicated inputs
# uo_out[7:0] : Dedicated outputs
# uio_in[7:0] : Bi-directional inputs (input path)
# uio_out[7:0] : Bi-directional outputs (output path)
# uio_oe[7:0] : Bi-directional output enable (active high: 0=input, 1=output)
# ena : always 1 when the design is powered
# clk : clock
# rst_n : reset_n - low to reset

pinout:
  # Inputs
  ui[0]: "unused"
  ui[1]: "unused"
  ui[2]: "unused"
  ui[3]: "Enable (1=On, 0=Off)"
  ui[4]: "Auto Mode Enable"
  ui[5]: "Tunable Select Bit 0"
  ui[6]: "Tunable Select Bit 1"
  ui[7]: "Tunable Select Bit 2"

  # Outputs
  uo[0]: "Random Byte Bit 0"
  uo[1]: "Random Byte Bit 1"
  uo[2]: "Random Byte Bit 2"
  uo[3]: "Random Byte Bit 3"
  uo[4]: "Random Byte Bit 4"
  uo[5]: "Random Byte Bit 5"
  uo[6]: "Random Byte Bit 6"
  uo[7]: "Random Byte Bit 7"

  # Bidirectional
  uio[0]: "Byte Valid Strobe"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6
